name: Update SALAAM Ratings

on:
  schedule:
    - cron: '13 16 * * *'   # 16:13 UTC daily — staggered +20 min after DILLON; CFBD API (separate source from sports-reference)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed for git push

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install cython numpy
          pip install --no-build-isolation -r requirements.txt

      - name: Fetch latest CFB data
        env:
          CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
        run: python fetch_data.py

      - name: Run ratings engine
        run: python salaam.py

      - name: Generate web data
        run: python generate_data.py

      - name: Commit and push updated data
        run: |
          git config user.name  "SALAAM Bot"
          git config user.email "salaam-bot@users.noreply.github.com"
          git add data/ all_NCAA_games.csv salaam_react_ratings.csv weekly_standings.csv salaam_ratings_with_standings.csv docs/data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update ratings $(date -u '+%Y-%m-%d')"
            # Race-safe push: if another commit landed during this run, rebase
            # the data update on top and retry. Avoids losing a day's data
            # update when a code push lands mid-cron-run.
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed; retrying in 5s..."
              sleep 5
            done
          fi
